<!DOCTYPE html> 
<html lang = "de">
    <head>
        <meta charset = "UTF-8">
        <title>Registrierung</title>
        <link rel="stylesheet" href="mystyle.css">
    </head>
    <body>
        <h1>Registrierung-Auto24</h1>
        <p>Bitte füllen Sie die folgenden Informationen aus, um ein neues Konto zu erstellen:</p>

        <label for = "benutzername">Benutzername:</label><br>
        <input type = "text" id = "benutzername" name = "benutzername" ><br><br>
   
        <label  for = "passwort">Passwort:</label><br>
        <input type = "password" id = "passwort" name = "passwort" ><br><br>
        
        <label for = "passwort_wiederholen">Passwort wiederholen:</label><br>
        <input type = "password" id = "passwort_wiederholen" name = "passwort_wiederholen" ><br><br>
        
        <input type = "submit" value = "Registrieren">
        <input type = "reset" value = "zurück zum Login"><br><br>
    </body>
    <footer>
        <p> &copy 2026 Auto24. Alle Rechte vorbehalten.</p>
    </footer>
</html>
